<!DOCTYPE html>
<html lang="id">
<head>
<meta charset='UTF-8'/>
<meta content='width=device-width, initial-scale=1.0' name='viewport'/>
<title>POS KASIR</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%9B%92%3C/text%3E%3C/svg%3E">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

:root {
  --primary: #0d9488;
  --primary-hover: #0f766e;
  --primary-light: #f0fdfa;
  --success: #10b981;
  --danger: #ef4444;
  --warning: #f59e0b;
  --bg-main: #f8fafc;
  --bg-card: #ffffff;
  --text-main: #0f172a;
  --text-muted: #64748b;
  --border: #e2e8f0;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 18px;
  --font-title: 'Outfit', sans-serif;
  --font-body: 'Plus Jakarta Sans', sans-serif;
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
  --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.05), 0 4px 6px -4px rgb(0 0 0 / 0.05);
  --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
}

.pk-root {
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--text-main);
  max-width: 100%;
  margin: 0 auto;
  background: var(--bg-main);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.pk-root * { box-sizing: border-box; }
.pk-hidden { display: none !important; }

/* Login Screen */
#pkLoginScreen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: radial-gradient(circle at top left, #115e59, #0f172a);
  padding: 24px;
}
.pk-login-wrap {
  width: 100%;
  max-width: 440px;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(12px);
  padding: 48px 40px;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-xl);
  border: 1px solid rgba(255, 255, 255, 0.2);
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
}
.pk-login-wrap::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 6px;
  background: linear-gradient(90deg, #2dd4bf, #0d9488);
}
.pk-login-wrap h2 {
  margin-top: 0;
  margin-bottom: 8px;
  text-align: center;
  color: #115e59;
  font-family: var(--font-title);
  font-weight: 800;
  font-size: 28px;
  letter-spacing: -0.5px;
}
.pk-field { margin-bottom: 20px; }
.pk-field label {
  display: block;
  margin-bottom: 8px;
  font-weight: 600;
  font-size: 13px;
  color: #334155;
}
.pk-field input, .pk-field select, .pk-field textarea {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid #cbd5e1;
  border-radius: var(--radius-md);
  font-size: 14px;
  transition: all 0.2s ease;
  font-family: inherit;
  background: #ffffff;
}
.pk-field input:focus, .pk-field select:focus, .pk-field textarea:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.15);
  background: #ffffff;
}

/* Buttons */
.pk-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 12px 24px;
  border: none;
  border-radius: var(--radius-md);
  background: var(--primary);
  color: #fff;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  font-family: inherit;
  box-shadow: var(--shadow-sm);
}
.pk-btn:hover {
  background: var(--primary-hover);
  box-shadow: 0 10px 15px -3px rgba(13, 148, 136, 0.25);
  transform: translateY(-1px);
}
.pk-btn:active {
  transform: translateY(1px);
  box-shadow: var(--shadow-sm);
}
.pk-btn-sec {
  background: #64748b;
}
.pk-btn-sec:hover {
  background: #475569;
  box-shadow: 0 10px 15px -3px rgba(100, 116, 139, 0.25);
}
.pk-btn-danger {
  background: var(--danger);
}
.pk-btn-danger:hover {
  background: #dc2626;
  box-shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.25);
}
.pk-btn-sm {
  padding: 8px 16px;
  font-size: 12px;
  border-radius: var(--radius-sm);
}

.pk-error {
  color: var(--danger);
  font-size: 13px;
  margin-top: 6px;
  font-weight: 500;
  background: #fef2f2;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  border-left: 3px solid var(--danger);
}
.pk-error:empty {
  display: none !important;
}

/* Layout */
.pk-shell {
  display: flex;
  min-height: 100vh;
  flex-direction: column;
}
.pk-grid-menu {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: 20px;
  margin-top: 24px;
}
.pk-menu-box {
  background: var(--bg-card);
  border-radius: 16px;
  padding: 24px 16px;
  text-align: center;
  cursor: pointer;
  box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.05);
  border: 1px solid var(--border);
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.pk-menu-box:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 24px -6px rgba(13, 148, 136, 0.12);
  border-color: rgba(13, 148, 136, 0.3);
}
.pk-menu-icon-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  margin-bottom: 12px;
  transition: all 0.3s ease;
}
.pk-menu-box:hover .pk-menu-icon-wrap {
  transform: scale(1.08);
}
.pk-menu-title {
  font-weight: 700;
  font-size: 14px;
  color: var(--text-main);
  font-family: var(--font-title);
}

/* Topbar & Content */
.pk-main-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--bg-main);
  min-width: 0;
  height: 100vh;
  overflow-y: auto;
}
.pk-topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #0f172a; /* Hardware POS Dark Slate */
  color: #ffffff;
  padding: 16px 32px;
  border-bottom: 1px solid #1e293b;
  box-shadow: var(--shadow-sm);
  position: sticky;
  top: 0;
  z-index: 10;
}
.pk-topbar #pkUserLabel {
  color: #94a3b8 !important;
}
.pk-topbar #pkStoreName {
  color: #2dd4bf !important; /* Touchscreen Terminal highlight color */
}

/* Cash Register Style Category Tab Buttons */
.pk-tab-btn {
  flex: 0 0 auto;
  padding: 8px 16px;
  border-radius: 30px;
  background: #e2e8f0;
  color: #475569;
  border: 1px solid #cbd5e1;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font-body);
}
.pk-tab-btn:hover {
  background: #cbd5e1;
  color: var(--text-main);
}
.pk-tab-btn.active {
  background: var(--primary);
  color: #ffffff;
  border-color: var(--primary);
  box-shadow: var(--shadow-sm);
}

/* Touchscreen Cash Register Product Cards */
.pk-product-touch-card {
  transition: all 0.2s ease-in-out;
}
.pk-product-touch-card:hover {
  transform: translateY(-2px);
  border-color: var(--primary) !important;
  box-shadow: var(--shadow-md) !important;
}
.pk-product-touch-card:active {
  transform: translateY(1px);
  background: #f8fafc !important;
}
.pk-content {
  padding: 32px;
  background: #ffffff;
  margin: 32px;
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-md);
  border: 1px solid var(--border);
}
.pk-content h2 {
  margin-top: 0;
  font-size: 24px;
  color: var(--text-main);
  font-weight: 700;
  font-family: var(--font-title);
  margin-bottom: 24px;
  position: relative;
  display: inline-block;
}
.pk-content h3 {
  font-size: 18px;
  color: var(--text-main);
  font-weight: 700;
  font-family: var(--font-title);
  margin-bottom: 16px;
  margin-top: 32px;
}

/* Table */
.pk-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 14px;
  margin-top: 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.pk-table th, .pk-table td {
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  text-align: left;
}
.pk-table th {
  background: #f8fafc;
  font-weight: 700;
  color: #475569;
  text-transform: uppercase;
  font-size: 11px;
  letter-spacing: 0.75px;
}
.pk-table tr:last-child td { border-bottom: none; }
.pk-table tr:hover td { background: #f8fafc; }

/* Flex Grid */
.pk-flex {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}
.pk-flex > div {
  flex: 1;
  min-width: 220px;
}

/* Dashboard Cards */
.pk-card {
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 24px;
  text-align: left;
  box-shadow: var(--shadow-md);
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
}
.pk-card::after {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 4px;
  background: var(--primary);
}
.pk-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}
.pk-card h4 {
  margin: 0 0 8px;
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  font-weight: 700;
  letter-spacing: 0.75px;
}
.pk-card .val {
  font-size: 32px;
  font-weight: 800;
  color: var(--primary);
  font-family: var(--font-title);
}

/* Tabs */
.pk-tabs {
  display: flex;
  gap: 24px;
  margin-bottom: 24px;
  border-bottom: 2px solid var(--border);
}
.pk-tab {
  padding: 12px 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-muted);
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all 0.2s;
}
.pk-tab:hover { color: var(--text-main); }
.pk-tab.active {
  border-bottom-color: var(--primary);
  color: var(--primary);
}

/* Badges */
.pk-badge {
  display: inline-block;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.pk-badge-red { background: #fee2e2; color: #ef4444; }
.pk-badge-green { background: #d1fae5; color: #10b981; }
.pk-badge-amber { background: #fef3c7; color: #f59e0b; }

/* Cart */
.pk-cart-row {
  display: flex;
  gap: 12px;
  align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid #f1f5f9;
  font-size: 14px;
}
.pk-cart-row span { flex: 1; font-weight: 500; }
.pk-cart-row:last-child { border-bottom: none; }
.pk-search-box {
  padding: 12px 18px;
  width: 100%;
  border: 1px solid #cbd5e1;
  border-radius: var(--radius-md);
  margin-bottom: 20px;
  font-size: 14px;
  transition: all 0.2s;
  font-family: inherit;
}
.pk-search-box:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.15);
}

/* Dynamic Varian Row & Dynamic Table Inputs */
.pk-varian-row input {
  padding: 8px 12px;
  border: 1px solid #cbd5e1;
  border-radius: var(--radius-sm);
  font-size: 13px;
  transition: all 0.2s;
}
.pk-varian-row input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.15);
}
.pk-cart-row input, .pk-table input {
  padding: 6px 10px;
  border: 1px solid #cbd5e1;
  border-radius: var(--radius-sm);
  font-size: 13px;
  transition: all 0.2s;
}
.pk-cart-row input:focus, .pk-table input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.15);
}

/* Responsive / Mobile Friendly */
@media (max-width: 768px) {
  .pk-login-wrap { padding: 36px 24px; border-radius: var(--radius-md); max-width: 100%; }
  .pk-login-wrap h2 { font-size: 24px; }
  .pk-topbar {
    padding: 12px 16px;
    flex-direction: row !important;
    justify-content: space-between;
    align-items: center;
    gap: 0;
  }
  #pkUserLabel {
    display: none; /* Hide profile name on mobile header to save space */
  }
  #pkStoreName { font-size: 15px !important; }
  .pk-content {
    margin: 0;
    padding: 16px;
    border: none;
    border-radius: 0;
    box-shadow: none;
    background: transparent;
  }
  .pk-content h2 { font-size: 18px; margin-bottom: 12px; }
  
  /* Transform table into a ListView on mobile */
  .pk-table, .pk-table tbody, .pk-table tr, .pk-table td {
    display: block;
    width: 100%;
  }
  .pk-table {
    border: none;
    box-shadow: none;
    background: transparent;
    overflow: visible;
  }
  .pk-table th {
    display: none; /* Hide headers */
  }
  .pk-table tr {
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: var(--shadow-sm);
    position: relative;
  }
  .pk-table td {
    border: none;
    padding: 8px 0;
    text-align: right;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    border-bottom: 1px dashed #f1f5f9;
  }
  .pk-table td:last-child {
    border-bottom: none;
    padding-bottom: 0;
    margin-top: 8px;
    padding-top: 12px;
    justify-content: flex-end;
    gap: 8px;
  }
  .pk-table td::before {
    content: attr(data-label);
    font-weight: 700;
    color: var(--text-muted);
    text-align: left;
    font-size: 12px;
    text-transform: uppercase;
    margin-right: 8px;
  }

  .pk-grid-menu { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
  .pk-menu-box { padding: 20px 10px; border-radius: 12px; }
  .pk-menu-icon-wrap { width: 48px; height: 48px; margin-bottom: 8px; }
  .pk-menu-icon-wrap svg { width: 22px; height: 22px; }
  .pk-menu-title { font-size: 13px; }
  .pk-flex > div { min-width: 100%; }
  .pk-tabs { overflow-x: auto; white-space: nowrap; padding-bottom: 4px; }
  .pk-card { padding: 16px; }
  .pk-card .val { font-size: 26px; }
}

/* Dashboard Grid */
.pk-grid-dashboard {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-bottom: 24px;
}
@media (max-width: 768px) {
  .pk-grid-dashboard {
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 12px;
  }
}

/* Custom Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: #f1f5f9; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

/* Receipt Print */
#pk-receipt { font-family: monospace; font-size: 12px; width: 280px; margin: 0 auto; padding: 10px; color: #000; background: #fff; }
@media print {
  body * { visibility: hidden; }
  #pk-receipt, #pk-receipt * { visibility: visible; }
  #pk-receipt { position: absolute; left: 0; top: 0; width: 100%; }
}
</style>
</head>
<body>
<div class='pk-root' id='pkRoot'>

  <!-- LOGIN SCREEN -->
  <div id='pkLoginScreen'>
    <div class='pk-login-wrap'>
      <h2>Kasir Toko Bangunan</h2>
      <p class="subtitle" style="text-align:center;color:#64748b;margin-top:4px;margin-bottom:24px;font-size:13px;line-height:1.4;">Kelola Penjualan, Stok, Hutang & Piutang dengan Mudah</p>
      <div class='pk-field'>
        <label>Username</label>
        <input id='pkLoginUser' placeholder='admin' type='text'/>
      </div>
      <div class='pk-field'>
        <label>Password</label>
        <input id='pkLoginPass' placeholder='admin123' type='password'/>
      </div>
      <div class='pk-error' id='pkLoginError'></div>
      <button class='pk-btn' onclick='pkLogin()' style='width:100%'>Masuk</button>
      <p style='font-size:11px;color:#888;margin-top:14px;text-align:center;'>
        Akun demo: admin/admin123, kasir/kasir123
      </p>
    </div>
  </div>

  <!-- APP SHELL -->
  <div class='pk-hidden' id='pkAppShell'>
    <div class='pk-shell'>
      <div class='pk-main-wrap'>
        <div class='pk-topbar'>
          <div style='display:flex;align-items:center;gap:16px;'>
            <button id='pkBtnBack' class='pk-btn pk-btn-sec pk-btn-sm pk-hidden' onclick='pkNav("home")' style='display:inline-flex;align-items:center;gap:6px;'>
              <i data-lucide="arrow-left" style="width:14px;height:14px;stroke-width:2.5;"></i> Menu
            </button>
            <div id='pkStoreName' style='font-weight:bold;font-size:18px;color:#111827;'></div>
          </div>
          <div>
            <span id='pkUserLabel' style='margin-right:16px;font-size:14px;font-weight:500;'></span>
            <button class='pk-btn pk-btn-danger pk-btn-sm' onclick='pkLogout()'>Keluar</button>
          </div>
        </div>
        <div class='pk-content' id='pkMain'></div>
      </div>
    </div>
  </div>

  <div class='pk-hidden' id='pk-receipt'></div>
</div>
<script>
/* =========================================================
   POS KASIR TOKO BANGUNAN - Single file, client-side only
   Data disimpan di localStorage. Backup/restore via JSON.
   ========================================================= */
const PK_KEY = 'posapp_data_v1';
const PK_SESSION_KEY = 'posapp_session_v1';
let DB = null;

function pkNextId(entity){
  DB.meta.nextId[entity] = (DB.meta.nextId[entity]||0)+1;
  return DB.meta.nextId[entity];
}
function pkSave(){ localStorage.setItem(PK_KEY, JSON.stringify(DB)); }
function pkLoad(){
  try {
    const raw = localStorage.getItem(PK_KEY);
    if(raw){
      DB = JSON.parse(raw);
      const defaultKeys = ['users', 'karyawan', 'kategori', 'produk', 'pelanggan', 'supplier', 'transaksi', 'transaksiDetail', 'pembelian', 'pembelianDetail', 'hutang', 'piutang', 'bayarHutang', 'bayarPiutang', 'poinLog', 'stokLog', 'pengaturan'];
      defaultKeys.forEach(k => {
        if(!DB[k]) DB[k] = (k === 'pengaturan') ? {} : [];
      });
      if(!DB.meta) DB.meta = {nextId:{}};
      if(!DB.meta.nextId) DB.meta.nextId = {};
      return;
    }
  } catch(e) {
    console.error("Local storage DB corrupted, resetting...", e);
  }
  pkSeed();
}
function pkSeed(){
  DB = {
    meta:{nextId:{}},
    users:[
      {id:1, nama:'Administrator', username:'admin', password:'admin123', role:'admin'},
      {id:2, nama:'Kasir 1', username:'kasir', password:'kasir123', role:'kasir'}
    ],
    karyawan:[
      {id:1, user_id:1, nama:'Administrator', jabatan:'Owner', no_hp:'-', alamat:'-', tanggal_masuk:'2024-01-01', gaji_pokok:0, status:'aktif'},
      {id:2, user_id:2, nama:'Kasir 1', jabatan:'Kasir', no_hp:'-', alamat:'-', tanggal_masuk:'2024-01-01', gaji_pokok:0, status:'aktif'}
    ],
    kategori:[
      {id:1, nama:'Semen & Bahan Bangunan'},
      {id:2, nama:'Cat & Finishing'},
      {id:3, nama:'Perkakas'}
    ],
    produk:[
      {id:1, kode:'SM001', nama:'Semen 40kg', kategori_id:1, satuan:'sak', harga_beli:55000, harga_jual:62000, stok:100, stok_min:10, status:'aktif'},
      {id:2, kode:'CT001', nama:'Cat Tembok 5kg', kategori_id:2, satuan:'kaleng', harga_beli:80000, harga_jual:95000, stok:40, stok_min:5, status:'aktif'},
      {id:3, kode:'PK001', nama:'Palu Kambing', kategori_id:3, satuan:'pcs', harga_beli:25000, harga_jual:35000, stok:20, stok_min:3, status:'aktif'}
    ],
    pelanggan:[
      {id:1, nama:'Pelanggan Umum', no_hp:'-', alamat:'-', tipe:'umum', poin:0}
    ],
    supplier:[

/* ---------- SESSION ---------- */
function pkGetSession(){
  const raw = sessionStorage.getItem(PK_SESSION_KEY);
  return raw ? JSON.parse(raw) : null;
}
function pkLogin(){
  const u = document.getElementById('pkLoginUser').value.trim();
  const p = document.getElementById('pkLoginPass').value;
  const user = DB.users.find(x=>x.username===u && x.password===p);
  if(!user){
    document.getElementById('pkLoginError').innerText = 'Username atau password salah';
    return;
  }
  sessionStorage.setItem(PK_SESSION_KEY, JSON.stringify({id:user.id, nama:user.nama, role:user.role}));
  pkBoot();
}
function pkLogout(){
  sessionStorage.removeItem(PK_SESSION_KEY);
  pkBoot();
}

function pkFilterProduk(q){
  q = q.toLowerCase();
  const list = DB.produk.filter(p=>p.nama.toLowerCase().includes(q) || p.kode.toLowerCase().includes(q));
  document.getElementById('pkProdukTable').innerHTML = `
    <tr><th>Kode</th><th>Nama</th><th>Kategori</th><th>Satuan</th><th>Harga Jual</th><th>Stok</th><th>Aksi</th></tr>
    ${list.map(p=>{
      const kat = DB.kategori.find(k=>k.id===p.kategori_id);
      let st = p.stok; let isLow = p.stok<=p.stok_min;
      if(p.has_varian && p.varian){
        st = p.varian.reduce((a,v)=>a+v.stok,0);
        isLow = p.varian.some(v=>v.stok<=p.stok_min);
      }
      const grosirLabel = p.min_grosir > 0 ? `<br><small style="color:#059669;">Grosir: ${pkFmt(p.harga_grosir)} (&#8805;${p.min_grosir})</small>` : '';
      return `<tr>
        <td data-label="Kode">${p.kode}</td>
        <td data-label="Nama">${p.nama}${grosirLabel}</td>
        <td data-label="Kategori">${kat?kat.nama:'-'}</td>
        <td data-label="Satuan">${p.satuan}</td>
        <td data-label="Harga Jual">${pkFmt(p.harga_jual)}</td>
        <td data-label="Stok">${st} ${isLow?'<span class=\"pk-badge pk-badge-red\">Menipis</span>':''}</td>
        <td data-label="">
          <button class="pk-btn pk-btn-sm" style="background:#3b82f6;margin-right:4px;" onclick="pkLoadEditProduk(${p.id})">Edit</button>
          <button class="pk-btn pk-btn-danger pk-btn-sm" onclick="pkDelProduk(${p.id})">Hapus</button>
        </td>
      </tr>`;
    }).join('')}
  `;
}
function pkAddProduk(){
  let kode = document.getElementById('pkPrKode').value.trim();
  const nama = document.getElementById('pkPrNama').value.trim();
  if(!nama){ alert('Nama produk wajib diisi'); return; }
  if(!kode){ kode = 'PRD' + Date.now().toString().slice(-6); }
  const has_varian = document.getElementById('pkPrHasVarian').checked;
  const varian = [];
  if(has_varian){
    document.querySelectorAll('.pk-varian-row').forEach(row=>{
      const vn = row.querySelector('.pkVarianNama').value.trim();
      const vs = Number(row.querySelector('.pkVarianStok').value||0);
      const vhb = Number(row.querySelector('.pkVarianHargaBeli').value||0);
      const vhj = Number(row.querySelector('.pkVarianHargaJual').value||0);
      if(vn) varian.push({nama:vn, stok:vs, harga_beli:vhb, harga_jual:vhj});
    });
    if(!varian.length){ alert('Minimal isi 1 varian'); return; }
  }
  
  if(pkEditProdukId){
    const p = DB.produk.find(x=>x.id===pkEditProdukId);
    if(p){
      p.kode = kode; p.nama = nama;
      p.kategori_id = Number(document.getElementById('pkPrKategori').value);
      p.satuan = document.getElementById('pkPrSatuan').value || 'pcs';
      p.harga_beli = Number(document.getElementById('pkPrHargaBeli').value||0);
      p.harga_jual = Number(document.getElementById('pkPrHargaJual').value||0);
      p.harga_grosir = Number(document.getElementById('pkPrHargaGrosir').value||0);
      p.min_grosir = Number(document.getElementById('pkPrMinGrosir').value||0);
      p.stok = Number(document.getElementById('pkPrStok').value||0);
      p.stok_min = Number(document.getElementById('pkPrStokMin').value||0);
      p.has_varian = has_varian; p.varian = varian;
    }
  } else {
    DB.produk.push({
      id: pkNextId('produk'), kode, nama,
      kategori_id: Number(document.getElementById('pkPrKategori').value),
      satuan: document.getElementById('pkPrSatuan').value || 'pcs',
      harga_beli: Number(document.getElementById('pkPrHargaBeli').value||0),
      harga_jual: Number(document.getElementById('pkPrHargaJual').value||0),
      harga_grosir: Number(document.getElementById('pkPrHargaGrosir').value||0),
      min_grosir: Number(document.getElementById('pkPrMinGrosir').value||0),
      stok: Number(document.getElementById('pkPrStok').value||0),
      stok_min: Number(document.getElementById('pkPrStokMin').value||0),
      status:'aktif', has_varian, varian
    });
  }
  pkSave(); pkRenderProdukList();
}
function pkLoadEditProduk(id){
  const p = DB.produk.find(x=>x.id===id);
  if(!p) return;
  pkEditProdukId = id;
  document.getElementById('pkPrKode').value = p.kode;
  document.getElementById('pkPrNama').value = p.nama;
  document.getElementById('pkPrKategori').value = p.kategori_id;
  document.getElementById('pkPrSatuan').value = p.satuan;
  document.getElementById('pkPrHargaBeli').value = p.harga_beli;
  document.getElementById('pkPrHargaJual').value = p.harga_jual;
  document.getElementById('pkPrHargaGrosir').value = p.harga_grosir;
  document.getElementById('pkPrMinGrosir').value = p.min_grosir;
  document.getElementById('pkPrStok').value = p.stok;
  document.getElementById('pkPrStokMin').value = p.stok_min;
  
  document.getElementById('pkPrHasVarian').checked = p.has_varian;
  pkToggleVarian(p.has_varian);
  
  if(p.has_varian && p.varian){

function pkGetCashSuggestions(total) {
  const suggestions = [total];
  const denoms = [10000, 20000, 50000, 100000];
  denoms.forEach(d => {
    if (d > total && !suggestions.includes(d)) {
      suggestions.push(d);
    }
  });
  const next50k = Math.ceil(total / 50000) * 50000;
  if (next50k > total && !suggestions.includes(next50k)) {
    suggestions.push(next50k);
  }
  const next10k = Math.ceil(total / 10000) * 10000;
  if (next10k > total && !suggestions.includes(next10k)) {
    suggestions.push(next10k);
  }
  suggestions.sort((a,b)=>a-b);
  
  return suggestions.slice(0, 5).map(s => {
    const label = s === total ? 'Uang Pas' : pkFmt(s);
    return `<button class="pk-btn pk-btn-sec pk-btn-sm" style="padding:6px 10px;font-size:12px;font-weight:600;" onclick="pkSetCashReceived(${s})">${label}</button>`;
  }).join('');
}

function pkSetCashReceived(val){
  const el = document.getElementById('pkTrBayar');
  if(el){
    el.value = val;
    pkCalcKembalian();
  }
}

function pkCalcKembalian(){
  const subtotal = pkCart.reduce((a,c)=>a+c.harga*c.qty,0);
  const diskon = Number(document.getElementById('pkTrDiskon')?.value||0);
  const total = Math.max(0, subtotal - diskon);
  const bayar = Number(document.getElementById('pkTrBayar')?.value||0);
  const kembalian = Math.max(0, bayar - total);
  
  const kembalianEl = document.getElementById('pkTrKembalian');
  if(kembalianEl) {
    kembalianEl.innerText = pkFmt(kembalian);
    if (bayar >= total) {
      kembalianEl.style.color = 'var(--success)';
    } else {
      kembalianEl.style.color = 'var(--danger)';
    }
  }
}

function pkTrOnMetodeChange(val){

    const total = Math.max(0, subtotal - diskon);

}

function pkTrSearchProduk(q){

  const gridHtml = list.map(p=>{
    let st = p.has_varian ? (p.varian||[]).reduce((a,v)=>a+v.stok,0) : p.stok;

  document.getElementById('pkModalVarian').remove();
  pkAddToCart(id, v);
}
function pkAddToCart(id, varian=''){
  const p = DB.produk.find(x=>x.id===id);
  if(!p) return;
  const v = (p.has_varian && varian) ? p.varian.find(x=>x.nama===varian) : null;
  const stokMaks = v ? v.stok : p.stok;
  if(stokMaks<=0){ alert('Stok habis'); return; }
  
  let hrgJual = p.harga_jual;
  let hrgBeli = p.harga_beli;
  if(v){
    if(v.harga_jual > 0) hrgJual = v.harga_jual;
    if(v.harga_beli > 0) hrgBeli = v.harga_beli;
  }

  const existing = pkCart.find(c=>c.produk_id===id && c.varian===varian);
  if(existing){
    if(existing.qty+1 > stokMaks){ alert('Stok tidak cukup'); return; }
    existing.qty++;
  } else {
    pkCart.push({produk_id:id, nama:p.nama, varian:varian, harga:hrgJual, harga_beli:hrgBeli, hrg_jual_asli:hrgJual, is_custom_price:false, qty:1});
  }
  pkRenderCart();
  pkShowToast(`${p.nama} ${varian ? `(${varian})` : ''} berhasil ditambahkan!`);
}
function pkSetQtyByIndex(index, val){
  const item = pkCart[index];
  if(!item) return;
  const p = DB.produk.find(x=>x.id===item.produk_id);
  if(!p) return;
  let qty = Number(val);
  if(isNaN(qty) || qty <= 0){
    pkCart.splice(index, 1);
  } else {
    const stok = (p.has_varian && item.varian) ? p.varian.find(v=>v.nama===item.varian).stok : p.stok;
    if(qty > stok) qty = stok;
    item.qty = qty;
  }
  pkRenderCart();
  if(pkTrStep === 'keranjang' && pkCart.length === 0) {
    pkTrGoToStep('produk');
  }
}
function pkSetHargaByIndex(index, val){
  const item = pkCart[index];
  if(!item) return;
  let baru = Number(val);
  if(isNaN(baru)) baru = item.hrg_jual_asli;
  if(baru < item.harga_beli){
    alert(`Harga tidak boleh di bawah modal (Rp ${item.harga_beli.toLocaleString('id-ID')})`);
    baru = item.harga_beli;
  }
  item.harga = baru;
  item.is_custom_price = true;
  pkRenderCart();
}
function pkRenderCart(){
  pkCart.forEach(c=>{
    if(!c.is_custom_price){
      const p = DB.produk.find(x=>x.id===c.produk_id);
      if(p && p.min_grosir > 0 && c.qty >= p.min_grosir){
        c.harga = p.harga_grosir;
      } else {
        c.harga = c.hrg_jual_asli;
      }
    }
  });
  const subtotal = pkCart.reduce((a,c)=>a+c.harga*c.qty,0);
  const diskon = Number(document.getElementById('pkTrDiskon')?.value||0);
  const total = Math.max(0, subtotal - diskon);

  const cartBox = document.getElementById('pkCartBox');
  if(cartBox){
    cartBox.innerHTML = pkCart.length ? pkCart.map((c,i)=>`
      <div class="pk-cart-row" style="flex-wrap:wrap;padding:12px 0;">
        <div style="flex:1;min-width:120px;">
          <span style="font-weight:600;color:var(--text-main);">${c.nama}</span>
          ${c.varian ? `<br><small style="color:#047857;font-weight:500;">Varian: ${c.varian}</small>` : ''}
        </div>
        <div style="display:flex;gap:6px;align-items:center;">
          <input type="number" step="0.01" style="width:70px;text-align:center;" value="${c.qty}" onchange="pkSetQtyByIndex(${i}, this.value)" title="Qty">
          <span style="color:#888;">x</span>
          <input type="number" style="width:100px;text-align:right;" value="${c.harga}" onchange="pkSetHargaByIndex(${i}, this.value)" title="Harga Satuan">
          <button class="pk-btn pk-btn-danger pk-btn-sm" onclick="pkRemoveFromCart(${i})" style="padding:6px 10px;margin-left:4px;display:inline-flex;align-items:center;justify-content:center;"><i data-lucide="trash-2" style="width:14px;height:14px;"></i></button>
        </div>
        <div style="text-align:right;width:80px;font-weight:700;color:var(--primary);font-family:var(--font-title);">${pkFmt(c.harga*c.qty)}</div>
      </div>
    `).join('') : '<div style="text-align:center;padding:24px 12px;color:var(--text-muted);border:2px dashed var(--border);border-radius:var(--radius-md);margin-bottom:16px;font-size:13px;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:6px;"><i data-lucide="shopping-cart" style="width:28px;height:28px;color:#94a3b8;"></i><span>Keranjang belanja kosong</span></div>';
  }

  const subtotalEl = document.getElementById('pkTrSubtotalVal');
  if(subtotalEl) subtotalEl.innerText = pkFmt(subtotal);

  const totalEl = document.getElementById('pkTrTotal');
  if(totalEl) totalEl.innerText = pkFmt(total);

  const badgeEl = document.getElementById('pkTrCartBadge');
  if(badgeEl){
    badgeEl.innerText = pkCart.reduce((a,c)=>a+c.qty,0);
  }

  if(typeof lucide !== 'undefined') lucide.createIcons();
  if(typeof pkCalcKembalian === 'function') pkCalcKembalian();
}
function pkCheckout(){
  if(!pkCart.length){ alert('Keranjang masih kosong'); return; }
  const session = pkGetSession();
  const pelangganId = Number(document.getElementById('pkTrPelanggan').value);
  const diskon = Number(document.getElementById('pkTrDiskon').value||0);
  const metode = document.getElementById('pkTrMetode').value;
  const subtotal = pkCart.reduce((a,c)=>a+c.harga*c.qty,0);
  const total = Math.max(0, subtotal - diskon);
  const bayar = metode === 'tunai' ? Number(document.getElementById('pkTrBayar')?.value || total) : total;

  if(metode === 'tunai' && bayar < total){
    alert('Jumlah uang yang diterima kurang dari total pembayaran!');
    return;
  }

  const now = new Date().toISOString();
  const pelanggan = DB.pelanggan.find(c=>c.id===pelangganId);

  let poinDidapat = 0;
  if(pelanggan && pelanggan.tipe==='member' && metode!=='piutang'){
    poinDidapat = Math.floor(total / DB.pengaturan.poin_per_rupiah);
  }

  const trId = pkNextId('transaksi');
  const noTrans = 'TRX-' + trId.toString().padStart(5,'0');
  
  const kembalian = metode === 'tunai' ? Math.max(0, bayar - total) : 0;

  DB.transaksi.push({
    id:trId, no:noTrans, tanggal:now, pelanggan_id:pelangganId, kasir_id:session.id,
    subtotal, diskon, total, metode_bayar:metode,
    status_bayar: metode==='piutang' ? 'belum_lunas' : 'lunas', poin_didapat:poinDidapat,
    bayar, kembalian
  });

  pkCart.forEach(c=>{
    const itemName = c.varian ? `${c.nama} - ${c.varian}` : c.nama;
    DB.transaksiDetail.push({id:pkNextId('transaksiDetail'), transaksi_id:trId, produk_id:c.produk_id, nama_item:itemName, qty:c.qty, harga:c.harga, subtotal:c.harga*c.qty});
    const p = DB.produk.find(x=>x.id===c.produk_id);
    if(p.has_varian && c.varian){
      const v = p.varian.find(x=>x.nama===c.varian);
      if(v) v.stok = Number((v.stok - c.qty).toFixed(4));
    } else {
      p.stok = Number((p.stok - c.qty).toFixed(4));
    }
    DB.stokLog.push({id:pkNextId('stokLog'), produk_id:c.produk_id, varian:c.varian, jenis:'keluar', qty:c.qty, referensi:noTrans, tanggal:now, keterangan:'Penjualan'});
  });

  if(metode==='piutang'){
    DB.piutang.push({id:pkNextId('piutang'), pelanggan_id:pelangganId, transaksi_id:trId, jumlah:total, sisa:total, jatuh_tempo:'', status:'belum_lunas'});
  }
  if(poinDidapat>0){
    pelanggan.poin += poinDidapat;
    DB.poinLog.push({id:pkNextId('poinLog'), pelanggan_id:pelangganId, transaksi_id:trId, jenis:'dapat', jumlah:poinDidapat, tanggal:now, keterangan:'Dari transaksi '+noTrans});
  }
  pkSave();
  pkCetakStruk(trId);
  pkCart = [];
  pkTrStep = 'produk';
  pkRenderTransaksi();
}
function pkCetakStruk(trId){
  const t = DB.transaksi.find(x=>x.id===trId);
  const items = DB.transaksiDetail.filter(d=>d.transaksi_id===trId);
  const s = DB.pengaturan;
  let html = `<div>${s.nama_toko}<br>${s.alamat}<br>${s.no_telp}</div><hr>`;
  html += `No: ${t.no}<br>Tgl: ${t.tanggal.slice(0,19).replace('T',' ')}<br><hr>`;
  items.forEach(i=>{
    const nama = i.nama_item || (DB.produk.find(x=>x.id===i.produk_id)?.nama) || '-';
    html += `${nama}<br>${i.qty} x ${pkFmt(i.harga)} = ${pkFmt(i.subtotal)}<br>`;
  });
  
  let bayarHtml = '';
  if(t.metode_bayar === 'tunai'){
    const b = t.bayar !== undefined ? t.bayar : t.total;
    const k = t.kembalian !== undefined ? t.kembalian : 0;
    bayarHtml = `Bayar (Tunai): ${pkFmt(b)}<br>Kembalian: ${pkFmt(k)}<br>`;
  } else {
    bayarHtml = `Bayar (${t.metode_bayar.toUpperCase()}): ${pkFmt(t.total)}<br>`;
  }
  
  html += `<hr>Subtotal: ${pkFmt(t.subtotal)}<br>Diskon: ${pkFmt(t.diskon)}<br><b>Total: ${pkFmt(t.total)}</b><br>${bayarHtml}<hr>${s.footer_struk}`;
  
  // Set hidden printable element
  const r = document.getElementById('pk-receipt');
  r.innerHTML = html;

  // Render popup receipt modal preview
  let modal = document.getElementById('pkReceiptModal');
  if(!modal){
    modal = document.createElement('div');
    modal.id = 'pkReceiptModal';
    modal.style = "position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,23,42,0.6);backdrop-filter:blur(6px);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;";
    document.body.appendChild(modal);
  }
  modal.innerHTML = `
    <div style="background:#ffffff;border-radius:16px;box-shadow:var(--shadow-xl);width:100%;max-width:340px;display:flex;flex-direction:column;max-height:90vh;overflow:hidden;border:1px solid var(--border);">
      <div style="padding:16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:#f8fafc;">
        <span style="font-weight:700;font-family:var(--font-title);color:var(--text-main);font-size:15px;display:flex;align-items:center;gap:6px;"><i data-lucide="receipt" style="width:18px;height:18px;color:var(--primary);"></i> Struk Transaksi</span>
        <button onclick="document.getElementById('pkReceiptModal').style.display='none'" style="border:none;background:transparent;cursor:pointer;color:var(--text-muted);display:flex;align-items:center;"><i data-lucide="x" style="width:20px;height:20px;"></i></button>
      </div>
      <div style="flex:1;overflow-y:auto;padding:20px;background:#f1f5f9;display:flex;justify-content:center;">
        <div style="background:#ffffff;box-shadow:var(--shadow-sm);border:1px solid var(--border);padding:20px;width:280px;height:fit-content;font-family:monospace;font-size:12px;color:#000;line-height:1.5;text-align:left;">
          ${html}
        </div>
      </div>
      <div style="padding:16px;border-top:1px solid var(--border);display:flex;gap:12px;background:#f8fafc;">
        <button class="pk-btn pk-btn-sec" onclick="document.getElementById('pkReceiptModal').style.display='none'" style="flex:1;">Tutup</button>
        <button class="pk-btn" onclick="window.print()" style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;"><i data-lucide="printer" style="width:14px;height:14px;"></i> Cetak</button>
      </div>
    </div>
  `;
  modal.style.display = 'flex';
  if(typeof lucide !== 'undefined') lucide.createIcons();
}

    <table class="pk-table"><tr><th>No</th><th>Supplier</th><th>Total</th><th>Status Bayar</th></tr>
      ${DB.pembelian.map(p=>{
        const s = DB.supplier.find(x=>x.id===p.supplier_id);

      }).join('')}

  `;

function pkPbCheckVarian(){
  const pid = Number(document.getElementById('pkPbProduk').value);
  const p = DB.produk.find(x=>x.id===pid);
  const box = document.getElementById('pkPbVarianBox');
  const sel = document.getElementById('pkPbVarian');
  const hrg = document.getElementById('pkPbHarga');
  sel.innerHTML = '';
  if(p && p.has_varian && p.varian && p.varian.length){
    sel.innerHTML = p.varian.map(v=>`<option value="${v.nama}">${v.nama}</option>`).join('');
    box.classList.remove('pk-hidden');
    hrg.value = p.varian[0].harga_beli || p.harga_beli || 0;
  } else {
    box.classList.add('pk-hidden');
    if(p) hrg.value = p.harga_beli || 0;
  }
}
function pkAddPembelianItem(){
  const produkId = Number(document.getElementById('pkPbProduk').value);
  const qty = Number(document.getElementById('pkPbQty').value||0);
  const harga = Number(document.getElementById('pkPbHarga').value||0);
  if(!produkId || !qty || !harga){ alert('Pilih produk, isi qty dan harga'); return; }
  const p = DB.produk.find(x=>x.id===produkId);
  let varian = '';
  if(p.has_varian){
    varian = document.getElementById('pkPbVarian').value;
    if(!varian){ alert('Pilih varian'); return; }
  }
  pkPembelianCart.push({produk_id:produkId, nama:p.nama, varian:varian, qty, harga});
  pkRenderPembelian();
}
function pkSimpanPembelian(){
  if(!pkPembelianCart.length){ alert('Belum ada item'); return; }
  const session = pkGetSession();
  const supplierId = Number(document.getElementById('pkPbSupplier').value);
  const jatuhTempo = document.getElementById('pkPbJatuhTempo').value;
  const statusBayar = document.getElementById('pkPbStatusBayar').value;
  const total = pkPembelianCart.reduce((a,i)=>a+i.qty*i.harga,0);
  const now = new Date().toISOString();
  const pbId = pkNextId('pembelian');
  const noPb = 'PB-' + pbId.toString().padStart(5,'0');
  DB.pembelian.push({id:pbId, no:noPb, tanggal:now, supplier_id:supplierId, user_id:session.id,
    total, status:'diterima', status_bayar:statusBayar, jatuh_tempo:jatuhTempo});
  pkPembelianCart.forEach(i=>{
    DB.pembelianDetail.push({id:pkNextId('pembelianDetail'), pembelian_id:pbId, produk_id:i.produk_id, varian:i.varian, qty:i.qty, harga:i.harga, subtotal:i.qty*i.harga});
    const p = DB.produk.find(x=>x.id===i.produk_id);
    if(p.has_varian && i.varian){
      const v = p.varian.find(x=>x.nama===i.varian);
      if(v){
        v.stok = Number((v.stok + i.qty).toFixed(4));
        v.harga_beli = i.harga;
      }
    } else {
      p.stok = Number((p.stok + i.qty).toFixed(4));
      p.harga_beli = i.harga;
    }
    DB.stokLog.push({id:pkNextId('stokLog'), produk_id:i.produk_id, varian:i.varian, jenis:'masuk', qty:i.qty, referensi:noPb, tanggal:now, keterangan:'Pembelian'});
  });
  if(statusBayar==='hutang'){
    DB.hutang.push({id:pkNextId('hutang'), supplier_id:supplierId, pembelian_id:pbId, jumlah:total, sisa:total, jatuh_tempo:jatuhTempo, status:'belum_lunas'});
  }
  pkSave();
  pkPembelianCart = [];
  pkRenderPembelian();
}

        <td data-label="Sisa">${pkFmt(p.sisa)}</td>
        <td data-label="Status"><span class="pk-badge ${p.status==='lunas'?'pk-badge-green':'pk-badge-red'}">${p.status}</span></td>
        <td data-label="Bayar">${p.status!=='lunas'?`<input type="number" placeholder="Jumlah" id="pkBayarP${p.id}" style="width:90px;margin-right:8px;">
        <button class="pk-btn pk-btn-sm" onclick="pkBayarPiutang(${p.id})">Bayar</button>`:'-'}</td>
      </tr>`;
    }).join('') || '<tr><td colspan="5">Belum ada piutang</td></tr>'}
    </table>
  `;
}
function pkBayarPiutang(piutangId){
  const p = DB.piutang.find(x=>x.id===piutangId);
  const jumlah = Number(document.getElementById('pkBayarP'+piutangId).value||0);
  if(jumlah<=0 || jumlah>p.sisa){ alert('Jumlah bayar tidak valid'); return; }
  p.sisa -= jumlah;
  if(p.sisa<=0) p.status='lunas'; else p.status='sebagian';
  DB.bayarPiutang.push({id:pkNextId('bayarPiutang'), piutang_id:piutangId, tanggal:new Date().toISOString(), jumlah, keterangan:''});
  pkSave(); pkRenderPiutang();
}

          <button class="pk-btn pk-btn-danger pk-btn-sm" onclick="pkDelKaryawan(${k.id})">Hapus</button>
        </td>
      </tr>`).join('')}

}
function pkAddKaryawan(){
  const nama = document.getElementById('pkKyNama').value.trim();
  if(!nama) return;
  if(pkEditKaryawanId){
    const k = DB.karyawan.find(x=>x.id===pkEditKaryawanId);
    if(k){
      k.nama = nama;
      k.jabatan = document.getElementById('pkKyJabatan').value;
      k.no_hp = document.getElementById('pkKyHp').value;
      k.gaji_pokok = Number(document.getElementById('pkKyGaji').value||0);
    }
    pkEditKaryawanId = null;
  } else {
    DB.karyawan.push({id:pkNextId('karyawan'), user_id:null, nama, jabatan:document.getElementById('pkKyJabatan').value,
      no_hp:document.getElementById('pkKyHp').value, alamat:'', tanggal_masuk:pkToday(),
      gaji_pokok:Number(document.getElementById('pkKyGaji').value||0), status:'aktif'});
  }
  pkSave(); pkView_karyawan();
}
function pkLoadEditKaryawan(id){
  const k = DB.karyawan.find(x=>x.id===id);
  if(!k) return;
  pkEditKaryawanId = id;
  document.getElementById('pkKyNama').value = k.nama;
  document.getElementById('pkKyJabatan').value = k.jabatan;
  document.getElementById('pkKyHp').value = k.no_hp;
  document.getElementById('pkKyGaji').value = k.gaji_pokok;
  document.getElementById('pkKyTitle').innerText = 'Edit Karyawan';
  document.getElementById('pkKyBtnSimpan').innerText = 'Simpan Perubahan';
  document.getElementById('pkKyBtnBatal').classList.remove('pk-hidden');
  window.scrollTo(0,0);
}

/* ================= BACKUP / RESTORE ================= */
function pkView_backup(){
  document.getElementById('pkMain').innerHTML = `
    <h2>Backup / Restore Data</h2>
    <div class="pk-card" style="margin-bottom:24px;">
      <p style="margin-top:0;color:var(--text-muted);">Gunakan fitur ini <b>sebelum pindah perangkat/browser</b>, karena data hanya tersimpan secara lokal di browser perangkat ini.</p>
      <button class="pk-btn" onclick="pkExportData()" style="display:inline-flex;align-items:center;gap:8px;">
        <i data-lucide="download" style="width:16px;height:16px;"></i> Download Backup (JSON)
      </button>
    </div>
    <div class="pk-card" style="border-color:rgba(239, 68, 68, 0.25);">
      <h3 style="margin-top:0;color:var(--danger);font-family:var(--font-title);font-weight:700;">Restore dari File Backup</h3>
      <p style="color:var(--text-muted);margin-bottom:16px;">Perhatian: proses pemulihan ini akan menimpa seluruh data transaksi, produk, dan pelanggan saat ini.</p>
      <div class="pk-field" style="max-width:320px;">
        <input type="file" id="pkImportFile" accept=".json" style="padding:8px 12px;border:1px dashed var(--border);background:#f8fafc;">
      </div>
      <button class="pk-btn pk-btn-danger" onclick="pkImportData()" style="display:inline-flex;align-items:center;gap:8px;">
        <i data-lucide="upload" style="width:16px;height:16px;"></i> Restore Data
      </button>
    </div>
  `;
}
function pkExportData(){
  const blob = new Blob([JSON.stringify(DB, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
  a.href = url;
  a.download = `backup-kasir-${stamp}.json`;
  a.click();
  URL.revokeObjectURL(url);
}
function pkImportData(){
  const fileInput = document.getElementById('pkImportFile');
  const file = fileInput.files[0];
  if(!file){ alert('Pilih file backup terlebih dahulu'); return; }
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const parsed = JSON.parse(e.target.result);
      if(!parsed.produk || !parsed.pengaturan){ throw new Error('Format file tidak sesuai'); }
      const defaultKeys = ['users', 'karyawan', 'kategori', 'produk', 'pelanggan', 'supplier', 'transaksi', 'transaksiDetail', 'pembelian', 'pembelianDetail', 'hutang', 'piutang', 'bayarHutang', 'bayarPiutang', 'poinLog', 'stokLog', 'pengaturan'];
      defaultKeys.forEach(k => {
        if(!parsed[k]) parsed[k] = (k === 'pengaturan') ? {} : [];
      });
      if(!parsed.meta) parsed.meta = {nextId:{}};
      if(!parsed.meta.nextId) parsed.meta.nextId = {};
      DB = parsed;
      pkSave();
      alert('Restore berhasil!');
      pkBoot();
    }catch(err){
      alert('Gagal restore: file tidak valid. ' + err.message);
    }
  };
  reader.readAsText(file);
}

/* ---------- START ---------- */
pkBoot();
</script>
